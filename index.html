            --bg-input: #0a121d;

        .camera-square { width: 100%; padding-top: 100%; position: relative; overflow: hidden; border-radius: 12px; background: #000; border: 1px solid var(--border-color); }
        .camera-square video { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: auto; height: 100%; min-width: 100%; min-height: 100%; object-fit: cover; }
        .finder { position: absolute; top: 50%; left: 50%; width: 70%; height: 70%; transform: translate(-50%,-50%); box-sizing: border-box; pointer-events: none; border: 2px solid rgba(255, 209, 0, 0.5); border-radius: 6px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6) inset; }
        .finder::before, .finder::after, .finder span::before, .finder span::after { content: ""; position: absolute; background: var(--theme-accent); border-radius: 2px; }
        .finder::before { top: -2px; left: -2px; width: 28px; height: 4px; }
        .finder::after { bottom: -2px; right: -2px; width: 28px; height: 4px; }
        .finder span::before { top: -2px; right: -2px; width: 4px; height: 28px; }
        .finder span::after { bottom: -2px; left: -2px; width: 4px; height: 28px; }

        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>

    (function(){

        const SUPABASE_URL = "https://jasmugudntbpycpffgeo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphc211Z3VkbnRicHljcGZmZ2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTU5OTYsImV4cCI6MjA5NTg5MTk5Nn0.SY4l-sWHj6zTnQ2vfPgxheAmnUWpi65Hd8eLLMd_oJk";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const authGate = document.getElementById('authGate');
        const appInterface = document.getElementById('appInterface');
        const loginBtn = document.getElementById('loginBtn');

        // Check Session on Load

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if(session) {
                authGate.classList.add('hidden');
                appInterface.classList.remove('hidden');

        async function handleLogin() {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            if(!email || !password) return;
            
            loginBtn.innerText = "AUTHENTICATING...";
            loginBtn.disabled = true;
            authError.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                authError.innerText = error.message;
                authError.classList.remove('hidden');
                loginBtn.innerText = "Authenticate";
                loginBtn.disabled = false;

                // Success: Play Animation

                welcomeOverlay.classList.remove('hidden');
                
                // Trigger CSS animations

        // --- 3. CORE APPLICATION ENGINE (Unchanged DB/Engine Logic) ---
        function bootAppEngine() {
            function uid() { return Date.now().toString(36) + Math.random().toString(36).substring(2); }
            const DB_NAME = 'stef-paveops-db';
            const DB_STORE = 'logs';
           
            function openDb(){
              return new Promise((res, rej) => {
                const r = indexedDB.open(DB_NAME, 2);
                r.onupgradeneeded = e => { if(!e.target.result.objectStoreNames.contains(DB_STORE)){ e.target.result.createObjectStore(DB_STORE, { keyPath: 'id' }); } };
                r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
              });
            }
           
            async function idbPut(entry){ const db = await openDb(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readwrite'); tx.objectStore(DB_STORE).put(entry); tx.oncomplete = ()=> res(); tx.onerror = e => rej(e.target.error); }); }
            async function idbGetAll(){ const db = await openDb(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readonly'); const req = tx.objectStore(DB_STORE).getAll(); req.onsuccess = ()=> res(req.result || []); req.onerror = e => rej(e.target.error); }); }
            async function idbDelete(id){ const db = await openDb(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readwrite'); tx.objectStore(DB_STORE).delete(id); tx.oncomplete = ()=> res(); tx.onerror = e => rej(e.target.error); }); }
         
            const video = document.getElementById('video'); const preview = document.getElementById('preview'); const status = document.getElementById('status');
            const openInApp = document.getElementById('openInApp'); const closeInApp = document.getElementById('closeInApp'); const captureBtn = document.getElementById('capture');
            const openNative = document.getElementById('openNative'); const cameraInput = document.getElementById('cameraInput');
            const logList = document.getElementById('logList'); const countSpan = document.getElementById('count');
            const downloadDateBtn = document.getElementById('downloadDate'); const exportDateInput = document.getElementById('exportDate');
            const cameraWrap = document.getElementById('cameraWrap'); const clearAllBtn = document.getElementById('clearAll');
            const scannerIndicator = document.getElementById('scannerIndicator');
            
            const globalDensity = document.getElementById('globalDensity');
            globalDensity.value = localStorage.getItem('stefPaveOpsBRD') || '2.40';
            globalDensity.addEventListener('input', (e) => { localStorage.setItem('stefPaveOpsBRD', e.target.value); });

            const mathModal = document.getElementById('mathModal'); const modalMass = document.getElementById('modalMass');
            const rawMassVal = document.getElementById('rawMassVal'); const rawTicketVal = document.getElementById('rawTicketVal'); const rawMixVal = document.getElementById('rawMixVal');
            const rawCompanyVal = document.getElementById('rawCompanyVal'); const rawCustomerVal = document.getElementById('rawCustomerVal'); const rawRegVal = document.getElementById('rawRegVal');
            const inputLength = document.getElementById('inputLength'); const inputWidth = document.getElementById('inputWidth');
            const inputDensity = document.getElementById('inputDensity');
            const calcAndSaveBtn = document.getElementById('calcAndSaveBtn'); const cancelModalBtn = document.getElementById('cancelModalBtn');

            const cutbackRadios = document.querySelectorAll('input[name="cutbackInc"]');
            const cutbackDimensions = document.getElementById('cutbackDimensions');
            cutbackRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'no') cutbackDimensions.classList.remove('hidden');
                    else cutbackDimensions.classList.add('hidden');
                });
            });

            const wastageRadios = document.querySelectorAll('input[name="wastageOcc"]');
            const wastageDetails = document.getElementById('wastageDetails');
            wastageRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'yes') wastageDetails.classList.remove('hidden');
                    else wastageDetails.classList.add('hidden');
                });
            });
         
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(err=> console.warn('SW failed', err)); }
            
            function setStatus(txt, active = false){ 
                status.textContent = txt; 
                if(active) {
                    status.classList.add('text-themeaccent'); status.classList.remove('text-thememuted');
                    scannerIndicator.classList.add('bg-themeaccent'); scannerIndicator.classList.remove('bg-thememuted');
                } else {
                    status.classList.remove('text-themeaccent'); status.classList.add('text-thememuted');
                    scannerIndicator.classList.remove('bg-themeaccent'); scannerIndicator.classList.add('bg-thememuted');
                }
            }
         
            async function renderLogs(){
              const logs = await idbGetAll(); logList.innerHTML = ''; logs.sort((a,b)=> (b.t > a.t ? 1 : -1));
              logs.forEach(l=>{
                const card = document.createElement('div'); 
                card.className = 'bg-themeinput p-4 rounded-xl border border-themeborder hover:border-themeaccent transition-colors text-sm shadow-sm';
                const dateObj = new Date(l.t); const scanTime = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                card.innerHTML = `
                  <div class="flex justify-between items-center border-b border-themeborder pb-2 mb-3">
                      <div class="font-code text-[10px] text-themeaccent tracking-widest uppercase">Scanned: ${scanTime}</div>
                      <button class="danger del-btn font-bold text-[10px] uppercase px-2 py-1 bg-rose-950/20 text-rose-500 rounded border border-rose-900" data-id="${l.id}">DEL</button>
                  </div>
                  <div class="grid grid-cols-2 gap-2 mb-3 font-code text-xs text-themetext">
                      <div><span class="text-thememuted">Co:</span> ${l.company}</div>
                      <div><span class="text-thememuted">Tkt:</span> ${l.truck}</div>
                      <div class="col-span-2"><span class="text-thememuted">Mix:</span> ${l.material}</div>
                  </div>
                  <div class="bg-themebg p-3 rounded-lg border border-themeborder flex justify-between items-center font-code text-xs">
                      <div><span class="text-thememuted">Eff. Mass:</span> <br><span class="font-bold text-themetext">${parseFloat(l.effectiveMass || l.tonnage).toFixed(2)}t</span></div>
                      <div><span class="text-thememuted">Rate:</span> <br><span class="font-bold text-themetext">${parseFloat(l.spreadRate).toFixed(2)} m²</span></div>
                      <div class="text-right"><span class="text-themeaccent opacity-90">Thick:</span> <br><span class="font-black text-themeaccent text-base">${parseFloat(l.thickness).toFixed(1)}mm</span></div>
                  </div>`;
                card.querySelector('.del-btn').onclick = async ()=> { await idbDelete(l.id); await renderLogs(); };
                logList.appendChild(card);
              });
              countSpan.textContent = logs.length;
            }
         
            function parseDecoded(text){
              const s = (text||'').trim().replace(/\n|\r/g, ' ').replace(/\s{2,}/g, ' '); 
              let parsed = { time: new Date().toISOString(), company: 'Unknown', customer: 'Unknown', material: 'Unknown Mix', truck: 'Unknown', registration: 'Unknown', tonnage: 0, raw: s };
              
              const getVal = (keywords) => {
                  const regexStr = `(?:${keywords})\\s*[:\\-]?\\s*(.+?)(?=\\s*(?:Company|Co|Customer|Client|DeliveryNote|Ticket|Tkt|Product|Material|Mix|Net|Mass|Weight|Registration|Reg|Despatched|DateTime|Date|Time|Plant|Job|Cartage by|Location|BC|Temp|Order|Tare|Gross|EPC)\\s*[:\\-]|$)`;
                  const match = s.match(new RegExp(regexStr, 'i'));
                  return match ? match[1].trim() : null;
              };

              parsed.company = getVal('Company|Co') || 'Unknown';
              parsed.customer = getVal('Customer|Client') || 'Unknown';
              parsed.truck = getVal('DeliveryNote|Ticket|Tkt|Note') || 'Unknown';
              parsed.material = getVal('Product|Material|Mix') || 'Unknown';
              parsed.registration = getVal('Registration|Reg|Vehicle') || 'Unknown';
              
              let rawMass = getVal('Net\\s*Mass|Net|Mass|Weight');
              if (!rawMass) {
                  const fallback = s.match(/(?:Net|Mass|Weight)[^\d]*([\d.]+)/i);
                  rawMass = fallback ? fallback[1] : "0";
              }
              parsed.tonnage = parseFloat(rawMass.replace(/[^\d.]/g, '')) || 0;
              
              const timeVal = getVal('Despatched|DateTime|Date|Time');
              if(timeVal) parsed.time = timeVal;
              
              return parsed;
            }
         
            async function handleDecodedText(decodedText){
              const parsed = parseDecoded(decodedText);
              if(video.srcObject) closeInApp.click();
              modalMass.innerText = parsed.tonnage > 0 ? parsed.tonnage.toFixed(2) : "0.00";
              rawMassVal.value = parsed.tonnage; rawTicketVal.value = parsed.truck; rawMixVal.value = parsed.material; rawCompanyVal.value = parsed.company; rawCustomerVal.value = parsed.customer; rawRegVal.value = parsed.registration;
              inputLength.value = ''; inputWidth.value = ''; 
              document.querySelector('input[name="cutbackInc"][value="yes"]').checked = true;
              document.querySelector('input[name="wastageOcc"][value="no"]').checked = true;
              cutbackDimensions.classList.add('hidden');
              wastageDetails.classList.add('hidden');
              document.getElementById('cutLength').value = '';
              document.getElementById('cutWidth').value = '';
              document.getElementById('wastedMass').value = '';
              document.getElementById('wastageReason').value = '';
              
              inputDensity.value = globalDensity.value;
              mathModal.classList.remove('hidden'); 
              setStatus('SYSTEM READY. INPUT DIMENSIONS.', true);
            }

            cancelModalBtn.addEventListener('click', () => { 
                mathModal.classList.add('hidden'); 
                setStatus('SCAN ABORTED', false); 
            });

            calcAndSaveBtn.addEventListener('click', async () => {
                const totalMassTonnes = parseFloat(rawMassVal.value) || 0; 
                const length = parseFloat(inputLength.value) || 0; 
                const width = parseFloat(inputWidth.value) || 0; 
                const brd = parseFloat(inputDensity.value) || 2.40;

                let totalArea = length * width;
                const cutbackIncluded = document.querySelector('input[name="cutbackInc"]:checked').value;
                let cLen = 0, cWid = 0;
                if(cutbackIncluded === 'no') {
                    cLen = parseFloat(document.getElementById('cutLength').value) || 0;
                    cWid = parseFloat(document.getElementById('cutWidth').value) || 0;
                    totalArea += (cLen * cWid);
                }

                let effectiveMass = totalMassTonnes;
                const wastageOccurred = document.querySelector('input[name="wastageOcc"]:checked').value;
                let wMass = 0;
                let wReason = "";
                if(wastageOccurred === 'yes') {
                    wMass = parseFloat(document.getElementById('wastedMass').value) || 0;
                    wReason = document.getElementById('wastageReason').value.trim() || "No reason provided";
                    effectiveMass -= wMass;
                }

                if(totalMassTonnes <= 0 || totalArea <= 0 || brd <= 0) { alert("SECURITY HALT: Primary dimensions and BRD must be greater than zero."); return; }
                if(effectiveMass <= 0) { alert("SECURITY HALT: Wasted mass cannot exceed or equal total delivered mass."); return; }

                const spreadRate = totalArea / effectiveMass; 
                const thickness = 1000 / (brd * spreadRate); 
                
                const entry = { 
                    id: uid(), t: new Date().toISOString(), company: rawCompanyVal.value, customer: rawCustomerVal.value, 
                    registration: rawRegVal.value, material: rawMixVal.value, truck: rawTicketVal.value, tonnage: totalMassTonnes, 
                    effectiveMass: effectiveMass, length: length, width: width, area: totalArea, spreadRate: spreadRate, 
                    density: brd, thickness: thickness, cutbackAdded: cutbackIncluded === 'no' ? 'Yes' : 'No', wastageMass: wMass, wastageReason: wReason
                };

                await idbPut(entry); await renderLogs(); 
                mathModal.classList.add('hidden'); 
                setStatus(`LOGGED TICKET ${entry.truck}`, true);
            });
         
            async function decodeCanvasOrBlob(source){
              let canvas; if(source instanceof HTMLCanvasElement) canvas = source; else { const img = new Image(); canvas = await new Promise((res, rej)=>{ img.onload = ()=> { const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(img.src); res(c); }; img.onerror = rej; img.src = URL.createObjectURL(source); }); }
              try { if(window.jsQR){ const ctx = canvas.getContext('2d'); const imgData = ctx.getImageData(0,0,canvas.width,canvas.height); const res = jsQR(imgData.data, imgData.width, imgData.height); if(res && res.data) return res.data; } } catch(e){}
              try { const ReaderClass = window.ZXing?.BrowserQRCodeReader || window.BrowserMultiFormatReader; if(ReaderClass){ const reader = new ReaderClass(); const blob = await new Promise(r=> canvas.toBlob(r,'image/png')); const url = URL.createObjectURL(blob); const result = await reader.decodeFromImageUrl(url); URL.revokeObjectURL(url); if(result && result.text) return result.text; } } catch(e){} return null;
            }
         
            function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
            async function waitForVideoReady(v){ const start = Date.now(); while ((v.readyState < 2) && (Date.now() - start) < 3000) await sleep(100); }
         
            openInApp.addEventListener('click', async ()=>{
              try { const constraints = { video: { facingMode: { ideal:'environment' } }, audio:false }; video.srcObject = await navigator.mediaDevices.getUserMedia(constraints); await waitForVideoReady(video); cameraWrap.classList.remove('hidden'); video.classList.remove('hidden'); closeInApp.classList.remove('hidden'); captureBtn.classList.remove('hidden'); openInApp.classList.add('hidden'); setStatus('ALIGN QR AND PRESS EXTRACT', true); } catch(e){ setStatus('CAMERA UNAVAILABLE', false); }
            });
            closeInApp.addEventListener('click', ()=>{ if(video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject = null; cameraWrap.classList.add('hidden'); video.classList.add('hidden'); closeInApp.classList.add('hidden'); captureBtn.classList.add('hidden'); openInApp.classList.remove('hidden'); setStatus('SYSTEM IDLE', false); });
            captureBtn.addEventListener('click', async ()=>{ if(!video.srcObject) return; const side = Math.min(video.videoWidth, video.videoHeight); const sx = (video.videoWidth - side) / 2; const sy = (video.videoHeight - side) / 2; preview.width = side; preview.height = side; const ctx = preview.getContext('2d'); ctx.drawImage(video, sx, sy, side, side, 0, 0, side, side); setStatus('DECRYPTING TICKET...', true); const blob = await new Promise(r=> preview.toBlob(r,'image/jpeg', 0.9)); const text = await decodeCanvasOrBlob(blob); if(text) await handleDecodedText(text); else setStatus('SCAN FAILED. RETRY.', false); });
            openNative.addEventListener('click', ()=> cameraInput.click());
            cameraInput.addEventListener('change', async ev=>{ const f = ev.target.files && ev.target.files[0]; if(!f) return; setStatus('DECRYPTING TICKET...', true); const text = await decodeCanvasOrBlob(f); if(text) await handleDecodedText(text); else setStatus('SCAN FAILED. RETRY.', false); cameraInput.value = ''; });
         
            function logsToCSV(rows){
              const header = ['Scan Date','Scan Time','Company','Client','Registration','Mix Type','Ticket','Total Delivered Mass (t)','Wasted Mass (t)','Effective Paved Mass (t)','Paved Length (m)','Paved Width (m)','Total Area (m2)','Spread Rate (m2/t)','Target BRD (t/m3)','Est. Thickness (mm)', 'Cutback Additions', 'Wastage Reason']; 
              const lines = [header.join(',')];
              rows.forEach(r=>{ 
                  const dateObj = new Date(r.t); 
                  lines.push([ 
                      dateObj.toLocaleDateString(), dateObj.toLocaleTimeString(), r.company, r.customer, r.registration, r.material, 
                      r.truck, r.tonnage.toFixed(2), r.wastageMass ? r.wastageMass.toFixed(2) : "0.00",
                      r.effectiveMass ? r.effectiveMass.toFixed(2) : r.tonnage.toFixed(2),
                      r.length.toFixed(2), r.width.toFixed(2), r.area.toFixed(2), r.spreadRate.toFixed(2), 
                      r.density.toFixed(2), r.thickness.toFixed(2), r.cutbackAdded || "No", r.wastageReason || "N/A"
                  ].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')); 
              }); 
              return lines.join('\n');
            }
         
            function downloadBlob(filename, blob){ const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
         
            downloadDateBtn.addEventListener('click', async ()=>{ const date = exportDateInput.value; if(!date) return alert('Engine Error: Select Date First'); const logs = (await idbGetAll()).filter(l => l.t.slice(0,10) === date); if(!logs.length) return alert('No data for ' + date); downloadBlob(`Stefanutti_PaveOps_${date}.csv`, new Blob([logsToCSV(logs)], {type:'text/csv'})); setStatus('REPORT EXPORTED', true); });
            clearAllBtn.addEventListener('click', async ()=>{ if(confirm('WARNING: Are you sure you want to permanently format the Ledger?')){ const db = await openDb(); const tx = db.transaction(DB_STORE, 'readwrite'); tx.objectStore(DB_STORE).clear(); await renderLogs(); setStatus('LEDGER FORMATTED', false); } });
         
            renderLogs(); document.getElementById('exportDate').valueAsDate = new Date();
        } 
    })();
    </script>
</body>
</html>
