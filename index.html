    <style>
        /* Smooth transitions for theme switching */
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        
        body { font-family: 'Inter', sans-serif; }
        .font-code { font-family: 'JetBrains Mono', monospace; }

        /* 1. CORPORATE DARK (Default - Based strictly on logo-512.png) */

            --bg-app: #020c1b;          
            --bg-panel: #00377c;        
            --bg-input: #00224d;        
            --border-color: #004b9e;    
            --text-main: #ffffff;       
            --text-muted: #94a3b8;      
            --theme-accent: #f7c505;

            --btn-text: #000000;        
            --theme-secondary: #00377c;

        /* 2. CORPORATE LIGHT (Clean, bright, utilizes brand blue for text) */
        [data-theme="light"] {
            --bg-app: #f1f5f9;          
            --bg-panel: #ffffff;        
            --bg-input: #e2e8f0;        
            --border-color: #cbd5e1;    
            --text-main: #00377c;       
            --text-muted: #64748b;      
            --theme-accent: #f7c505;    
            --theme-accent-hover: #eab308; 
            --btn-text: #000000;        
            --theme-secondary: #00377c;
        }

        /* 3. FIELD DAY (High Contrast for bright sunlight visibility) */
        [data-theme="field"] {
            --bg-app: #ffffff;          
            --bg-panel: #f8fafc;        
            --bg-input: #ffffff;        
            --border-color: #00377c;    
            --text-main: #000000;       
            --text-muted: #334155;      
            --theme-accent: #00377c;    
            --theme-accent-hover: #00224d; 
            --btn-text: #f7c505;        
            --theme-secondary: #f7c505;
        }

        /* 4. DUSK (Muted Slate to reduce eye strain, yellow pops out) */
        [data-theme="dusk"] {
            --bg-app: #0f172a;          
            --bg-panel: #1e293b;        
            --bg-input: #334155;        
            --border-color: #475569;    
            --text-main: #f8fafc;       
            --text-muted: #94a3b8;      
            --theme-accent: #f7c505;    
            --theme-accent-hover: #ca8a04; 
            --btn-text: #000000;        
            --theme-secondary: #00377c;
        }

        /* CAMERA STYLES */
        .camera-square { width: 100%; padding-top: 100%; position: relative; overflow: hidden; border-radius: 12px; background: #000; border: 1px solid var(--border-color); }
        .camera-square video { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: auto; height: 100%; min-width: 100%; min-height: 100%; object-fit: cover; }
        .finder { position: absolute; top: 50%; left: 50%; width: 70%; height: 70%; transform: translate(-50%,-50%); box-sizing: border-box; pointer-events: none; border: 2px solid rgba(247, 197, 5, 0.5); border-radius: 6px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6) inset; }
        .finder::before, .finder::after, .finder span::before, .finder span::after { content: ""; position: absolute; background: var(--theme-accent); border-radius: 2px; }
        .finder::before { top: -2px; left: -2px; width: 28px; height: 4px; }
        .finder::after { bottom: -2px; right: -2px; width: 28px; height: 4px; }
        .finder span::before { top: -2px; right: -2px; width: 4px; height: 28px; }
        .finder span::after { bottom: -2px; left: -2px; width: 4px; height: 28px; }

        /* THEME TOGGLE BUTTONS */
        .theme-btn {
            border: 1px solid var(--border-color);
            background: var(--bg-input);

            background: var(--theme-accent);
            color: var(--btn-text);
            border-color: var(--theme-accent);
            font-weight: bold;

    (function(){

        const supabaseUrl = "https://jasmugudntbpycpffgeo.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphc211Z3VkbnRicHljcGZmZ2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTU5OTYsImV4cCI6MjA5NTg5MTk5Nn0.SY4l-sWHj6zTnQ2vfPgxheAmnUWpi65Hd8eLLMd_oJk";

            if (session) { showMainApplication(); } else { authGate.classList.remove('hidden'); }
        }
        checkInitialSession();

        loginBtn.addEventListener('click', executeLogin);

        async function executeLogin() {
            const email = emailInput.value.trim(); const password = passwordInput.value;
            if(!email || !password) return;
            loginBtn.innerText = "AUTHENTICATING..."; loginBtn.disabled = true; authError.classList.add('hidden');
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                authError.innerText = error.message; authError.classList.remove('hidden');

            } else { showMainApplication(); }
        }

        signOutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            appInterface.classList.add('hidden'); authGate.classList.remove('hidden');
            emailInput.value = ''; passwordInput.value = ''; loginBtn.innerText = "Sign In"; loginBtn.disabled = false;

            function uid() { return Date.now().toString(36) + Math.random().toString(36).substring(2); }

            async function idbDelete(id){ await supabase.from('logs').delete().eq('id', id); }
         
            const video = document.getElementById('video'); const preview = document.getElementById('preview'); const status = document.getElementById('status');

            const globalDensity = document.getElementById('globalDensity');
            globalDensity.value = localStorage.getItem('tcPaveOpsBRD') || '2.40';
            globalDensity.addEventListener('input', (e) => { localStorage.setItem('tcPaveOpsBRD', e.target.value); });

            const mathModal = document.getElementById('mathModal'); const modalMass = document.getElementById('modalMass');
            const rawMassVal = document.getElementById('rawMassVal'); const rawTicketVal = document.getElementById('rawTicketVal'); const rawMixVal = document.getElementById('rawMixVal');
            const rawCompanyVal = document.getElementById('rawCompanyVal'); const rawCustomerVal = document.getElementById('rawCustomerVal'); const rawRegVal = document.getElementById('rawRegVal');
            const inputLength = document.getElementById('inputLength'); const inputWidth = document.getElementById('inputWidth');
            const inputDensity = document.getElementById('inputDensity');
            const calcAndSaveBtn = document.getElementById('calcAndSaveBtn'); const cancelModalBtn = document.getElementById('cancelModalBtn');

            const cutbackRadios = document.querySelectorAll('input[name="cutbackInc"]');
            const cutbackDimensions = document.getElementById('cutbackDimensions');
            cutbackRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'no') cutbackDimensions.classList.remove('hidden');
                    else cutbackDimensions.classList.add('hidden');
                });
            });

            const wastageRadios = document.querySelectorAll('input[name="wastageOcc"]');
            const wastageDetails = document.getElementById('wastageDetails');
            wastageRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'yes') wastageDetails.classList.remove('hidden');
                    else wastageDetails.classList.add('hidden');
                });
            });
         
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(err=> console.warn(err)); }
            
            function setStatus(txt, active = false){ 
                status.textContent = txt; 
                if(active) {
                    status.classList.add('text-themeaccent'); status.classList.remove('text-themetext');
                    scannerIndicator.classList.add('bg-themeaccent'); scannerIndicator.classList.remove('bg-themeinput');
                } else {
                    status.classList.remove('text-themeaccent'); status.classList.add('text-themetext');
                    scannerIndicator.classList.remove('bg-themeaccent'); scannerIndicator.classList.add('bg-themeinput');
                }
            }
         
            // ==========================================
            // CRITICAL COTO CALCULATION RENDER FUNCTION
            // ==========================================
            async function renderLogs(){
              const logs = await idbGetAll(); 
              logList.innerHTML = ''; 
              logs.sort((a,b)=> (b.t > a.t ? 1 : -1));

              logs.forEach(l=>{
                const card = document.createElement('div'); 
                card.className = 'bg-themeinput p-4 rounded-xl border border-themeborder hover:border-themeaccent transition-colors text-sm shadow-sm';
                
                const dateObj = new Date(l.t); 
                const scanTime = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const displayMix = l.material || 'Unknown Mix';
                const displayEffMass = parseFloat(l.effectiveMass || l.tonnage || 0).toFixed(2);
                const displaySpreadRate = parseFloat(l.spreadRate || 0).toFixed(2);
                const displayThickness = parseFloat(l.thickness || 0).toFixed(1);
                const displayTicket = l.truck || 'N/A';
                const displayCompany = l.company || 'N/A';

                card.innerHTML = `
                  <div class="flex justify-between items-center border-b border-themeborder pb-2 mb-3">
                      <div class="font-code text-[10px] text-themeaccent tracking-widest uppercase font-bold">Scanned: ${scanTime}</div>
                      <button class="danger del-btn font-bold text-[10px] uppercase px-2 py-1 bg-rose-950/20 text-rose-500 rounded border border-rose-900/50" data-id="${l.id}">DEL</button>
                  </div>
                  
                  <div class="grid grid-cols-2 gap-2 mb-3 font-code text-xs text-themetext">
                      <div><span class="text-thememuted">Co:</span> ${displayCompany}</div>
                      <div><span class="text-thememuted">Tkt:</span> ${displayTicket}</div>
                      <div class="col-span-2 bg-themepanel/40 p-2 rounded border border-themeborder/40 mt-1">
                          <span class="text-thememuted uppercase text-[9px] block tracking-wider font-bold">Mix Design Type</span>
                          <span class="text-themeaccent font-bold">${displayMix}</span>
                      </div>
                  </div>
                  
                  <div class="bg-themepanel p-3 rounded-lg border border-themeborder grid grid-cols-3 gap-2 items-center text-center font-code text-xs text-themetext">
                      <div class="border-r border-themeborder/60 text-left pl-1">
                          <span class="text-thememuted text-[9px] uppercase block">Eff. Tons</span>
                          <span class="font-black text-sm text-themetext">${displayEffMass}t</span>
                      </div>
                      <div class="border-r border-themeborder/60 text-left pl-2">
                          <span class="text-thememuted text-[9px] uppercase block">Spread Rate</span>
                          <span class="font-black text-sm text-themetext">${displaySpreadRate} m²/t</span>
                      </div>
                      <div class="text-right pr-1">
                          <span class="text-themeaccent text-[9px] uppercase block font-bold">Paved Thick.</span>
                          <span class="font-black text-themeaccent text-lg">${displayThickness} mm</span>
                      </div>
                  </div>`;

                card.querySelector('.del-btn').onclick = async ()=> { 
                    if(confirm(`Delete ticket ${displayTicket}?`)) {
                        await idbDelete(l.id); 
                        await renderLogs(); 
                    }
                };
                logList.appendChild(card);
              });
              countSpan.textContent = logs.length;
            }
         
            function parseDecoded(text){
              const s = (text||'').trim().replace(/\n|\r/g, ' ').replace(/\s{2,}/g, ' '); 
              let parsed = { time: new Date().toISOString(), company: 'Unknown', customer: 'Unknown', material: 'Unknown Mix', truck: 'Unknown', registration: 'Unknown', tonnage: 0, raw: s };
              const getVal = (keywords) => {
                  const regexStr = `(?:${keywords})\\s*[:\\-]?\\s*(.+?)(?=\\s*(?:Company|Co|Customer|Client|DeliveryNote|Ticket|Tkt|Product|Material|Mix|Net|Mass|Weight|Registration|Reg|Despatched|DateTime|Date|Time|Plant|Job|Cartage by|Location|BC|Temp|Order|Tare|Gross|EPC)\\s*[:\\-]|$)`;
                  const match = s.match(new RegExp(regexStr, 'i')); return match ? match[1].trim() : null;
              };
              parsed.company = getVal('Company|Co') || 'Unknown'; parsed.customer = getVal('Customer|Client') || 'Unknown';
              parsed.truck = getVal('DeliveryNote|Ticket|Tkt|Note') || 'Unknown'; parsed.material = getVal('Product|Material|Mix') || 'Unknown';
              parsed.registration = getVal('Registration|Reg|Vehicle') || 'Unknown';
              let rawMass = getVal('Net\\s*Mass|Net|Mass|Weight');
              if (!rawMass) { const fallback = s.match(/(?:Net|Mass|Weight)[^\d]*([\d.]+)/i); rawMass = fallback ? fallback[1] : "0"; }
              parsed.tonnage = parseFloat(rawMass.replace(/[^\d.]/g, '')) || 0;
              const timeVal = getVal('Despatched|DateTime|Date|Time'); if(timeVal) parsed.time = timeVal;
              return parsed;
            }
         
            async function handleDecodedText(decodedText){
              const parsed = parseDecoded(decodedText); if(video.srcObject) closeInApp.click();
              modalMass.innerText = parsed.tonnage > 0 ? parsed.tonnage.toFixed(2) : "0.00";
              rawMassVal.value = parsed.tonnage; rawTicketVal.value = parsed.truck; rawMixVal.value = parsed.material; rawCompanyVal.value = parsed.company; rawCustomerVal.value = parsed.customer; rawRegVal.value = parsed.registration;
              inputLength.value = ''; inputWidth.value = ''; 
              document.querySelector('input[name="cutbackInc"][value="yes"]').checked = true;
              document.querySelector('input[name="wastageOcc"][value="no"]').checked = true;
              cutbackDimensions.classList.add('hidden'); wastageDetails.classList.add('hidden');
              inputDensity.value = globalDensity.value; mathModal.classList.remove('hidden'); 
              setStatus('SYSTEM READY. INPUT DIMENSIONS.', true);
            }

            cancelModalBtn.addEventListener('click', () => { mathModal.classList.add('hidden'); setStatus('SCAN ABORTED', false); });

            // ==========================================
            // CRITICAL COTO CALCULATION MATH ENGINE
            // ==========================================
            calcAndSaveBtn.addEventListener('click', async () => {
                const totalMassTonnes = parseFloat(rawMassVal.value) || 0; 
                const length = parseFloat(inputLength.value) || 0; 
                const width = parseFloat(inputWidth.value) || 0; 
                const brd = parseFloat(inputDensity.value) || 2.40;
                
                let totalArea = length * width;
                if(document.querySelector('input[name="cutbackInc"]:checked').value === 'no') {
                    totalArea += (parseFloat(document.getElementById('cutLength').value) || 0) * (parseFloat(document.getElementById('cutWidth').value) || 0);
                }
                
                let effectiveMass = totalMassTonnes; let wMass = 0; let wReason = "";
                if(document.querySelector('input[name="wastageOcc"]:checked').value === 'yes') {
                    wMass = parseFloat(document.getElementById('wastedMass').value) || 0;
                    wReason = document.getElementById('wastageReason').value.trim() || "No reason provided";
                    effectiveMass -= wMass;
                }
                
                if(totalMassTonnes <= 0 || totalArea <= 0 || brd <= 0 || effectiveMass <= 0) { 
                    alert("VALIDATION HALT: Parameters out of range."); 
                    return; 
                }
                
                // --- Core Formulas ---
                const spreadRate = totalArea / effectiveMass; 
                const thickness = 1000 / (brd * spreadRate); 
                
                const entry = { 
                    id: uid(), t: new Date().toISOString(), company: rawCompanyVal.value, customer: rawCustomerVal.value, registration: rawRegVal.value, 
                    material: rawMixVal.value, truck: rawTicketVal.value, tonnage: totalMassTonnes, effectiveMass: effectiveMass, length: length, width: width, 
                    area: totalArea, spreadRate: spreadRate, density: brd, thickness: thickness, cutbackAdded: document.querySelector('input[name="cutbackInc"]:checked').value === 'no' ? 'Yes' : 'No',
                    wastageMass: wMass, wastageReason: wReason
                };
                
                await idbPut(entry); await renderLogs(); mathModal.classList.add('hidden'); setStatus(`LOGGED TICKET ${entry.truck}`, true);
            });
         
            async function decodeCanvasOrBlob(source){
              let canvas; if(source instanceof HTMLCanvasElement) canvas = source; else { const img = new Image(); canvas = await new Promise((res, rej)=>{ img.onload = ()=> { const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(img.src); res(c); }; img.onerror = rej; img.src = URL.createObjectURL(source); }); }
              try { if(window.jsQR){ const ctx = canvas.getContext('2d'); const imgData = ctx.getImageData(0,0,canvas.width,canvas.height); const res = jsQR(imgData.data, imgData.width, imgData.height); if(res && res.data) return res.data; } } catch(e){}
              try { const ReaderClass = window.ZXing?.BrowserQRCodeReader || window.BrowserMultiFormatReader; if(ReaderClass){ const reader = new ReaderClass(); const blob = await new Promise(r=> canvas.toBlob(r,'image/png')); const url = URL.createObjectURL(blob); const result = await reader.decodeFromImageUrl(url); URL.revokeObjectURL(url); if(result && result.text) return result.text; } } catch(e){} return null;
            }
         
            async function waitForVideoReady(v){ const start = Date.now(); while ((v.readyState < 2) && (Date.now() - start) < 3000) await new Promise(r=>setTimeout(r,100)); }
         
            openInApp.addEventListener('click', async ()=>{
              try { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal:'environment' } }, audio:false }); await waitForVideoReady(video); cameraWrap.classList.remove('hidden'); video.classList.remove('hidden'); closeInApp.classList.remove('hidden'); captureBtn.classList.remove('hidden'); openInApp.classList.add('hidden'); setStatus('ALIGN QR AND PRESS EXTRACT', true); } catch(e){ setStatus('CAMERA UNAVAILABLE', false); }
            });
            closeInApp.addEventListener('click', ()=>{ if(video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject = null; cameraWrap.classList.add('hidden'); video.classList.add('hidden'); closeInApp.classList.add('hidden'); captureBtn.classList.add('hidden'); openInApp.classList.remove('hidden'); setStatus('SYSTEM IDLE', false); });
            captureBtn.addEventListener('click', async ()=>{ if(!video.srcObject) return; const side = Math.min(video.videoWidth, video.videoHeight); const sx = (video.videoWidth - side) / 2; const sy = (video.videoHeight - side) / 2; preview.width = side; preview.height = side; preview.getContext('2d').drawImage(video, sx, sy, side, side, 0, 0, side, side); setStatus('DECRYPTING TICKET...', true); const blob = await new Promise(r=> preview.toBlob(r,'image/jpeg', 0.9)); const text = await decodeCanvasOrBlob(blob); if(text) await handleDecodedText(text); else setStatus('SCAN FAILED. RETRY.', false); });
            openNative.addEventListener('click', ()=> cameraInput.click());
            cameraInput.addEventListener('change', async ev=>{ const f = ev.target.files && ev.target.files[0]; if(!f) return; setStatus('DECRYPTING TICKET...', true); const text = await decodeCanvasOrBlob(f); if(text) await handleDecodedText(text); else setStatus('SCAN FAILED. RETRY.', false); cameraInput.value = ''; });
         
            function logsToCSV(rows){
              const header = ['Scan Date','Scan Time','Company','Client','Registration','Mix Type','Ticket','Total Mass (t)','Wasted Mass (t)','Effective Mass (t)','Length (m)','Width (m)','Area (m2)','Spread Rate (m2/t)','Target BRD','Thickness (mm)', 'Cutback Included', 'Wastage Comment']; 
              const lines = [header.join(',')];
              rows.forEach(r=>{ const dateObj = new Date(r.t); lines.push([dateObj.toLocaleDateString(), dateObj.toLocaleTimeString(), r.company, r.customer, r.registration, r.material, r.truck, r.tonnage.toFixed(2), r.wastageMass ? r.wastageMass.toFixed(2) : "0.00", r.effectiveMass ? r.effectiveMass.toFixed(2) : r.tonnage.toFixed(2), r.length.toFixed(2), r.width.toFixed(2), r.area.toFixed(2), r.spreadRate.toFixed(2), r.density.toFixed(2), r.thickness.toFixed(2), r.cutbackAdded || "No", r.wastageReason || "N/A"].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')); }); return lines.join('\n');
            }
         
            function downloadBlob(filename, blob){ const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
            downloadDateBtn.addEventListener('click', async ()=>{ const date = exportDateInput.value; if(!date) return alert('Select Date'); const logs = (await idbGetAll()).filter(l => l.t.slice(0,10) === date); if(!logs.length) return alert('No data'); downloadBlob(`SS_Coastal_PaveOps_${date}.csv`, new Blob([logsToCSV(logs)], {type:'text/csv'})); setStatus('REPORT EXPORTED', true); });
            clearAllBtn.addEventListener('click', async ()=>{ if(confirm('Permanently clear database?')){ const { error } = await supabase.from('logs').delete().neq('id', '_none_'); if (!error) { await renderLogs(); setStatus('LEDGER CLEAR', false); } } });
         
            renderLogs(); document.getElementById('exportDate').valueAsDate = new Date();
        } 
    })();
    </script>
</body>
</html>
