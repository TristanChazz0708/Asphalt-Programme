<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Ten Civils | Pacing Engine</title>
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="manifest.json">
  <style>
    /* TITAN DIGITAL LABS / TEN CIVILS THEME */
    :root {
      --bg-main: #020617;
      --bg-panel: #0f172a;
      --accent: #10b981;
      --accent-hover: #059669;
      --danger: #e11d48;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #1e293b;
    }

    body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; margin: 0; background: var(--bg-main); color: var(--text-main); antialiased; }
    header { background: var(--bg-panel); color: var(--text-main); padding: 20px; text-align: center; border-bottom: 1px solid var(--accent); }
    header h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
    header span { color: var(--accent); }
    
    .wrap { max-width: 800px; margin: 16px auto; padding: 12px; }
    .card { background: var(--bg-panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    button { margin: 6px 4px; padding: 16px 24px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; background: var(--accent); color: #000; transition: all 0.2s; }
    button:active { transform: scale(0.98); }
    button.ghost { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
    button.danger { background: rgba(225, 29, 72, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    .hidden { display: none !important; }
    
    /* MODAL STYLES */
    #mathModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    .modal-content { background: var(--bg-panel); border: 1px solid var(--accent); border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; }
    .modal-content h3 { margin-top: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
    .input-group input { width: 100%; padding: 12px; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); border-radius: 6px; font-size: 1rem; box-sizing: border-box; outline: none; }
    .input-group input:focus { border-color: var(--accent); }
    .readonly-val { font-size: 1.2rem; font-weight: bold; color: var(--text-main); }
    .help-text { font-size: 0.65rem; color: var(--accent); display: block; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* TABLE STYLES */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
    th { color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; border-bottom: 1px solid var(--border); padding: 12px 6px; text-align: left; }
    td { border-bottom: 1px solid var(--border); padding: 12px 6px; text-align: left; }
    .td-highlight { color: var(--accent); font-weight: bold; }
    
    #status { margin-top: 12px; font-weight: bold; color: var(--accent); text-align: center; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
    
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
    .field { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
    input[type="date"] { padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-size: 1rem; margin-bottom: 8px; width: 80%; max-width: 300px; color-scheme: dark;}
    
    /* Camera UI */
    .camera-wrap { position: relative; width: 100%; max-width: 500px; margin: 0 auto 16px auto; }
    .camera-square { width: 100%; padding-top: 100%; position: relative; overflow: hidden; border-radius: 8px; background: #000; border: 1px solid var(--border); }
    .camera-square video { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: auto; height: 100%; min-width: 100%; min-height: 100%; object-fit: cover; }
    .finder { position: absolute; top: 50%; left: 50%; width: 70%; height: 70%; transform: translate(-50%,-50%); box-sizing: border-box; pointer-events: none; border: 2px solid rgba(16, 185, 129, 0.5); border-radius: 6px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6) inset; }
    .finder::before, .finder::after, .finder span::before, .finder span::after { content: ""; position: absolute; background: var(--accent); border-radius: 2px; }
    .finder::before { top: -2px; left: -2px; width: 28px; height: 4px; }
    .finder::after { bottom: -2px; right: -2px; width: 28px; height: 4px; }
    .finder span::before { top: -2px; right: -2px; width: 4px; height: 28px; }
    .finder span::after { bottom: -2px; left: -2px; width: 4px; height: 28px; }
    
    .footer-brand { text-align: center; margin-top: 40px; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>
  <header>
    <h2>Ten Civils <span>|</span> Pacing Engine</h2>
  </header>
 
  <div class="wrap">
    <section class="card" id="scannerCard">
      <div id="status" role="status">SYSTEM IDLE — AWAITING CAMERA INITIALIZATION</div>
      <br>
 
      <div class="camera-wrap hidden" id="cameraWrap">
        <div class="camera-square" id="cameraSquare">
          <video id="video" playsinline autoplay muted class="hidden"></video>
          <div class="finder"><span></span></div>
        </div>
      </div>
 
      <canvas id="preview" class="hidden"></canvas>
 
      <div class="controls">
        <button id="openInApp" style="width: 100%;">Initialize Scanner</button>
        <button id="capture" class="hidden" style="width: 100%;">Extract Note Data</button>
        <button id="closeInApp" class="ghost hidden" style="width: 100%;">Abort Scan</button>
      </div>
     
      <div class="controls" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">
        <button id="openNative" class="ghost" style="width: 100%;">Upload Image/File</button>
      </div>
 
      <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
    </section>
 
    <section class="card" id="logsCard">
      <h3 style="text-align: center; text-transform: uppercase; font-size: 1rem; color: var(--text-muted); letter-spacing: 1px;">Shift Ledger (<span id="count" style="color: var(--accent);">0</span>)</h3>
 
      <div style="overflow-x: auto;">
        <table id="logTable">
          <thead>
            <tr>
              <th>Ticket</th>
              <th>Mass (t)</th>
              <th>Spread (m²/t)</th>
              <th>Thick (mm)</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
 
      <div style="margin-top:20px" class="controls">
        <div class="field">
          <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Export Shift Data</label>
          <input id="exportDate" type="date">
          <button id="downloadDate" class="ghost" style="width: 80%;">Download Report (CSV)</button>
        </div>
        <div class="field" style="border: none;">
          <button id="clearAll" class="danger">Clear Ledger</button>
        </div>
      </div>
    </section>
  </div>

  <div class="footer-brand">Engineered by Titan Digital Labs</div>

  <div id="mathModal" class="hidden">
      <div class="modal-content">
          <h3>COTO 2020 Engine</h3>
          
          <div class="input-group">
              <label>Extracted Mass (Tonnes)</label>
              <div class="readonly-val" id="modalMass">0.00</div>
              <input type="hidden" id="rawMassVal">
              <input type="hidden" id="rawTicketVal">
              <input type="hidden" id="rawMixVal">
              <input type="hidden" id="rawTimeVal">
          </div>

          <div class="input-group">
              <label>Paved Length (m)</label>
              <input type="number" id="inputLength" placeholder="e.g. 50" step="0.1">
          </div>

          <div class="input-group">
              <label>Paved Width (m)</label>
              <input type="number" id="inputWidth" placeholder="e.g. 3.5" step="0.1">
          </div>

          <div class="input-group">
              <label>Target BRD (Lab Pending)</label>
              <input type="number" id="inputDensity" value="2.40" step="0.01">
              <span class="help-text">Defaults to 2.40 Design BRD for live pacing.</span>
          </div>

          <div class="controls" style="margin-top: 25px;">
              <button id="calcAndSaveBtn" style="width: 100%;">Calculate & Log</button>
              <button id="cancelModalBtn" class="ghost" style="width: 100%;">Discard</button>
          </div>
      </div>
  </div>
 
  <script src="libs/jsqr.min.js"></script>
  <script src="libs/zxing.min.js"></script>
 
  <script>
  (function(){
    // -------------------------
    // Utility & IndexedDB
    // -------------------------
    function uid() { return Date.now().toString(36) + Math.random().toString(36).substring(2); }
 
    const DB_NAME = 'ten-civils-db';
    const DB_STORE = 'logs';
   
    function openDb(){
      return new Promise((res, rej) => {
        const r = indexedDB.open(DB_NAME, 1);
        r.onupgradeneeded = e => {
          const db = e.target.result;
          if(!db.objectStoreNames.contains(DB_STORE)){
            db.createObjectStore(DB_STORE, { keyPath: 'id' });
          }
        };
        r.onsuccess = e => res(e.target.result);
        r.onerror = e => rej(e.target.error);
      });
    }
   
    async function idbPut(entry){
      const db = await openDb();
      return new Promise((res, rej) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(entry);
        tx.oncomplete = ()=> res();
        tx.onerror = e => rej(e.target.error);
      });
    }
   
    async function idbGetAll(){
      const db = await openDb();
      return new Promise((res, rej) => {
        const tx = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).getAll();
        req.onsuccess = ()=> res(req.result || []);
        req.onerror = e => rej(e.target.error);
      });
    }
   
    async function idbDelete(id){
      const db = await openDb();
      return new Promise((res, rej) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).delete(id);
        tx.oncomplete = ()=> res();
        tx.onerror = e => rej(e.target.error);
      });
    }
 
    // -------------------------
    // Config & Elements
    // -------------------------
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const openInApp = document.getElementById('openInApp');
    const closeInApp = document.getElementById('closeInApp');
    const captureBtn = document.getElementById('capture');
    const openNative = document.getElementById('openNative');
    const cameraInput = document.getElementById('cameraInput');
    const logTableBody = document.querySelector('#logTable tbody');
    const countSpan = document.getElementById('count');
    const downloadDateBtn = document.getElementById('downloadDate');
    const exportDateInput = document.getElementById('exportDate');
    const cameraWrap = document.getElementById('cameraWrap');
    const clearAllBtn = document.getElementById('clearAll');
    
    // Modal Elements
    const mathModal = document.getElementById('mathModal');
    const modalMass = document.getElementById('modalMass');
    const rawMassVal = document.getElementById('rawMassVal');
    const rawTicketVal = document.getElementById('rawTicketVal');
    const rawMixVal = document.getElementById('rawMixVal');
    const rawTimeVal = document.getElementById('rawTimeVal');
    const inputLength = document.getElementById('inputLength');
    const inputWidth = document.getElementById('inputWidth');
    const inputDensity = document.getElementById('inputDensity');
    const calcAndSaveBtn = document.getElementById('calcAndSaveBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
 
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err=> console.warn('SW failed', err));
    }
 
    function setStatus(txt){ status.textContent = txt; }
 
    // -------------------------
    // Logging UI
    // -------------------------
    async function renderLogs(){
      const logs = await idbGetAll();
      logTableBody.innerHTML = '';
      logs.sort((a,b)=> (b.t > a.t ? 1 : -1));
     
      logs.forEach(l=>{
        const tr = document.createElement('tr');
       
        tr.innerHTML = `
          <td style="font-family: monospace;">${l.truck || 'N/A'}</td>
          <td>${parseFloat(l.tonnage).toFixed(2)}</td>
          <td>${parseFloat(l.spreadRate).toFixed(2)}</td>
          <td class="td-highlight">${parseFloat(l.thickness).toFixed(1)}</td>
        `;
       
        const tdAction = document.createElement('td');
        const del = document.createElement('button');
        del.textContent = 'X';
        del.className = 'danger';
        del.style.padding = '8px 12px';
        del.onclick = async ()=> { await idbDelete(l.id); await renderLogs(); };
       
        tdAction.appendChild(del);
        tr.appendChild(tdAction);
        logTableBody.appendChild(tr);
      });
      countSpan.textContent = logs.length;
    }
 
    // -------------------------
    // Parsing & Math Engine
    // -------------------------
    function parseDecoded(text){
      const s = (text||'').trim();
      let parsed = { time: new Date().toISOString(), material:'', truck:'', tonnage: 0, raw: s };
      
      try {
        const obj = JSON.parse(s);
        parsed.time = obj.timestamp || parsed.time;
        parsed.material = obj.materialType || obj.material || '';
        parsed.truck = obj.ticket || obj.truckId || obj.truck || '';
        parsed.tonnage = parseFloat(obj.netWeight || obj.tonnage || 0);
        return parsed;
      } catch(e){} 
     
      const parts = s.split(/[\n\r|;,]+/).map(p=>p.trim()).filter(Boolean);
      if(parts.length >= 4) {
          parsed.time = parts[0]; parsed.material = parts[1]; parsed.truck = parts[2]; parsed.tonnage = parseFloat(parts[3] || 0);
      } else if(parts.length === 3) {
          parsed.material = parts[0]; parsed.truck = parts[1]; parsed.tonnage = parseFloat(parts[2] || 0);
      }
      return parsed;
    }
 
    async function handleDecodedText(decodedText){
      const parsed = parseDecoded(decodedText);
      
      // Stop camera if running
      if(video.srcObject) closeInApp.click();
      
      // Populate Modal
      modalMass.innerText = parsed.tonnage > 0 ? parsed.tonnage.toFixed(2) : "0.00";
      rawMassVal.value = parsed.tonnage;
      rawTicketVal.value = parsed.truck;
      rawMixVal.value = parsed.material;
      rawTimeVal.value = parsed.time;
      
      // Reset inputs
      inputLength.value = '';
      inputWidth.value = '';
      
      mathModal.classList.remove('hidden');
      setStatus('Engine ready. Input dimensions.');
    }

    cancelModalBtn.addEventListener('click', () => {
        mathModal.classList.add('hidden');
        setStatus('Scan Aborted.');
    });

    calcAndSaveBtn.addEventListener('click', async () => {
        const massTonnes = parseFloat(rawMassVal.value) || 0;
        const length = parseFloat(inputLength.value) || 0;
        const width = parseFloat(inputWidth.value) || 0;
        const brd = parseFloat(inputDensity.value) || 2.40;

        if(massTonnes <= 0 || length <= 0 || width <= 0 || brd <= 0) {
            alert("Mass, Length, Width, and BRD must be greater than zero.");
            return;
        }

        // COTO 2020 MATHEMATICS UPDATE
        const area = length * width;
        const spreadRate = area / massTonnes; // m2/t
        const thickness = 1000 / (brd * spreadRate); // mm

        const entry = {
          id: uid(),
          t: rawTimeVal.value,
          material: rawMixVal.value,
          truck: rawTicketVal.value,
          tonnage: massTonnes,
          length: length,
          width: width,
          area: area,
          spreadRate: spreadRate,
          density: brd,
          thickness: thickness
        };
 
        await idbPut(entry);
        await renderLogs();
        mathModal.classList.add('hidden');
        setStatus(`Logged: Ticket ${entry.truck} | Est: ${thickness.toFixed(1)}mm`);
    });
 
    // -------------------------
    // Decoding Logic
    // -------------------------
    async function decodeCanvasOrBlob(source){
      let canvas;
      if(source instanceof HTMLCanvasElement) canvas = source;
      else {
        const img = new Image();
        canvas = await new Promise((res, rej)=>{
          img.onload = ()=> {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img,0,0);
            URL.revokeObjectURL(img.src); res(c);
          };
          img.onerror = rej;
          img.src = URL.createObjectURL(source);
        });
      }
 
      try {
        if(window.jsQR){
          const ctx = canvas.getContext('2d');
          const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
          const res = jsQR(imgData.data, imgData.width, imgData.height);
          if(res && res.data) return res.data;
        }
      } catch(e){}
 
      try {
        const ReaderClass = window.ZXing?.BrowserQRCodeReader || window.BrowserMultiFormatReader;
        if(ReaderClass){
          const reader = new ReaderClass();
          const blob = await new Promise(r=> canvas.toBlob(r,'image/png'));
          const url = URL.createObjectURL(blob);
          const result = await reader.decodeFromImageUrl(url);
          URL.revokeObjectURL(url);
          if(result && result.text) return result.text;
        }
      } catch(e){}
 
      return null;
    }
 
    // -------------------------
    // Camera Handlers
    // -------------------------
    function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
   
    async function waitForVideoReady(v){
      const start = Date.now();
      while ((v.readyState < 2) && (Date.now() - start) < 3000) await sleep(100);
    }
 
    openInApp.addEventListener('click', async ()=>{
      try {
        const constraints = { video: { facingMode: { ideal:'environment' } }, audio:false };
        video.srcObject = await navigator.mediaDevices.getUserMedia(constraints);
        await waitForVideoReady(video);
       
        cameraWrap.classList.remove('hidden');
        video.classList.remove('hidden');
        closeInApp.classList.remove('hidden');
        captureBtn.classList.remove('hidden');
        openInApp.classList.add('hidden');
        setStatus('Align QR and press Scan Note');
      } catch(e){
        setStatus('Camera unavailable. Use Device Camera.');
      }
    });
 
    closeInApp.addEventListener('click', ()=>{
      if(video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
      video.srcObject = null;
      cameraWrap.classList.add('hidden');
      video.classList.add('hidden');
      closeInApp.classList.add('hidden');
      captureBtn.classList.add('hidden');
      openInApp.classList.remove('hidden');
      setStatus('System Idle');
    });
 
    captureBtn.addEventListener('click', async ()=>{
      if(!video.srcObject) return;
     
      const side = Math.min(video.videoWidth, video.videoHeight);
      const sx = (video.videoWidth - side) / 2;
      const sy = (video.videoHeight - side) / 2;
     
      preview.width = side; preview.height = side;
      const ctx = preview.getContext('2d');
      ctx.drawImage(video, sx, sy, side, side, 0, 0, side, side);
     
      setStatus('Decrypting Note...');
      const blob = await new Promise(r=> preview.toBlob(r,'image/jpeg', 0.9));
     
      const text = await decodeCanvasOrBlob(blob);
      if(text) await handleDecodedText(text);
      else setStatus('Scan Failed. Please retry.');
    });
 
    openNative.addEventListener('click', ()=> cameraInput.click());
   
    cameraInput.addEventListener('change', async ev=>{
      const f = ev.target.files && ev.target.files[0]; if(!f) return;
      setStatus('Decrypting Note...');
      const text = await decodeCanvasOrBlob(f);
      if(text) await handleDecodedText(text);
      else setStatus('Scan Failed. Please retry.');
      cameraInput.value = '';
    });
 
    // -------------------------
    // Exports (CSV)
    // -------------------------
    function logsToCSV(rows){
      const header = ['Date','Time','Mix Type','Ticket','Mass (t)','Length (m)','Width (m)','Area (m2)','Spread Rate (m2/t)','Target BRD (t/m3)','Est. Thickness (mm)'];
      const lines = [header.join(',')];
      rows.forEach(r=>{
        const dateObj = new Date(r.t);
        const dateStr = dateObj.toLocaleDateString();
        const timeStr = dateObj.toLocaleTimeString();
        
        lines.push([
            dateStr, timeStr, 
            r.material, r.truck, r.tonnage.toFixed(2), 
            r.length.toFixed(2), r.width.toFixed(2), r.area.toFixed(2), 
            r.spreadRate.toFixed(2), r.density.toFixed(2), r.thickness.toFixed(2)
        ].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','));
      });
      return lines.join('\n');
    }
 
    function downloadBlob(filename, blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    }
 
    downloadDateBtn.addEventListener('click', async ()=>{
      const date = exportDateInput.value;
      if(!date) return setStatus('Engine Error: Select Date First');
      const logs = (await idbGetAll()).filter(l => l.t.slice(0,10) === date);
      if(!logs.length) return setStatus('No data for ' + date);
     
      downloadBlob(`TenCivils_Pacing_Report_${date}.csv`, new Blob([logsToCSV(logs)], {type:'text/csv'}));
      setStatus('Report Exported Successfully');
    });
 
    clearAllBtn.addEventListener('click', async ()=>{
      if(confirm('WARNING: Are you sure you want to permanently format the Ledger?')){
        const db = await openDb();
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).clear();
        await renderLogs();
        setStatus('Ledger formatted');
      }
    });
 
    // Boot sequence
    renderLogs();
    
    // Set today as default export date
    document.getElementById('exportDate').valueAsDate = new Date();
  })();
  </script>
</body>
</html>
